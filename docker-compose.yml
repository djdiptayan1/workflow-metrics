services:
  ci-observe:
    image: ${CI_OBSERVE_IMAGE:-djdiptayan/workflow-metrics:latest}
    build: .
    init: true
    ports:
      - '5173:3000'
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      ORIGIN: ${ORIGIN:-http://localhost:5173}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
      - cache
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--appendfsync',
        'everysec',
        '--save',
        '',
        '--maxmemory',
        '384mb',
        '--maxmemory-policy',
        'allkeys-lru'
      ]
    volumes:
      - redis_data:/data
    networks:
      - cache
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    restart: unless-stopped

volumes:
  redis_data:

networks:
  cache:
    internal: true
